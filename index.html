<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CineSearch Pro</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <script src="app.js" defer></script>
</head> 
<body>

  <div class="app">

    <header>
          <span class="logo"><span style="color: var(--accent)">Cine</span>Search Pro</span> <div id="search-wrap" data-loading="false">
          <input type="text" id="search-input" placeholder="Search for a movie...."> 
          <div class="spinner"></div>
        </div>
      </header>

    <aside>
       <div class="sidebar-header">
        <span class="sidebar-label">Results</span>
        <span id="result-count"></span>
       </div>
       <template id="result-template">
          <li class="result-item">
              <div class="result-poster">🎬</div>
              <div class="result-info">
                  <div class="result-title"></div>
                  <div class="result-meta"></div>
              </div>
              <div class="result-rating"></div>
          </li>
       </template>
       <ul id="result-list">
       </ul>
    </aside>

    <main>
       <div id="detail-panel">
       </div>
    </main>

  </div>
</body>
</html>
